<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <!-- LOGIN -->
    <div id="loginSection" class="row justify-content-center">

        <div class="col-md-6">

            <div class="card bg-secondary">

                <div class="card-body">

                    <h2 class="text-center mb-4">Admin Login</h2>

                    <input type="text" id="username" class="form-control mb-3" placeholder="Username">
                    <input type="password" id="password" class="form-control mb-3" placeholder="Password">

                    <button class="btn btn-warning w-100" onclick="login()">Login</button>

                </div>

            </div>

        </div>

    </div>

    <!-- DODAVANJE -->
    <div id="addSeriesSection" class="row justify-content-center mt-4" style="display:none;">

        <div class="col-md-6">

            <div class="card bg-secondary">

                <div class="card-body">

                    <h3>Dodaj seriju</h3>

                    <input type="text" id="naziv" class="form-control mb-2" placeholder="Naziv">
                    <input type="text" id="zanr" class="form-control mb-2" placeholder="Žanr">
                    <input type="number" id="godina" class="form-control mb-2" placeholder="Godina">
                    <input type="number" step="0.1" id="ocena" class="form-control mb-3" placeholder="Ocena">

                    <button class="btn btn-primary w-100" onclick="dodajSeriju()">Dodaj</button>

                </div>

            </div>

        </div>

    </div>

    <!-- LISTA -->
    <div class="row mt-5">

        <div class="col-12">

            <h3 class="mb-3">Sve serije</h3>

            <div id="adminSerije" class="row"></div>

        </div>

    </div>

</div>

<script>

function login() {

    fetch("login.php", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        credentials: "same-origin",
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    })
    .then(r => r.json())
    .then(data => {

        if(data.success){

            document.getElementById("loginSection").style.display = "none";
            document.getElementById("addSeriesSection").style.display = "block";

            ucitajSerije();

        } else {
            alert(data.message);
        }
    });
}

async function dodajSeriju() {

    const naziv = document.getElementById("naziv").value;
    const zanr = document.getElementById("zanr").value;
    const godina = document.getElementById("godina").value;
    const ocena = document.getElementById("ocena").value;

    await fetch("api.php?akcija=ADD_SERIJA", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        credentials: "same-origin",
        body: JSON.stringify({naziv, zanr, godina, ocena, slika:""})
    });

    ucitajSerije();
}

async function ucitajSerije() {

    const res = await fetch("api.php?akcija=GET");
    const data = await res.json();

    const container = document.getElementById("adminSerije");
    container.innerHTML = "";

    data.data.forEach(s => {

        container.innerHTML += `
            <div class="col-md-4 mb-3">
                <div class="card bg-dark text-light">
                    <div class="card-body">

                        <h5>${s.naziv}</h5>
                        <p>${s.zanr}</p>
                        <p>⭐ ${s.ocena}</p>

                        <button class="btn btn-danger w-100"
                            onclick="obrisiSeriju(${s.id})">
                            Obriši
                        </button>

                    </div>
                </div>
            </div>
        `;
    });
}

async function obrisiSeriju(id) {

    await fetch("api.php?akcija=DELETE&id=" + id, {
        method: "POST",
        credentials: "same-origin"
    });

    ucitajSerije();
}

</script>

</body>
</html>
