<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serije</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="stil.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4">

    <div class="container">

        <span class="navbar-brand">
            🎬 Evidencija serija
        </span>

        <a href="admin.html" class="btn btn-warning">
            Admin
        </a>

    </div>

</nav>

<div class="container">

    <div class="row mb-4">

        <div class="col-md-6">

            <input
                type="text"
                id="search"
                class="form-control"
                placeholder="Pretraga serija..."
            >

        </div>

        <div class="col-md-3 d-flex justify-content-end">

            <button
                onclick="pretraziSerije()"
                class="btn btn-primary btn-sm"
            >
                Pretraži
            </button>

        </div>

        <div class="col-md-3">

            <select
                id="sort"
                class="form-select"
                onchange="sortirajSerije()"
            >
                <option value="DESC">
                    Najveća ocena
                </option>

                <option value="ASC">
                    Najmanja ocena
                </option>

            </select>

        </div>

    </div>

    <div class="row mt-4" id="serije"></div>

</div>

<script src="aplikacija.js"></script>

</body>
</html>
